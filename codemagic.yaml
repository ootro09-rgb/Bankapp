workflows:
  blunarkbank-ios-unsigned:
    name: BlunarKBank iOS sin firma
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
      vars:
        XCODE_SCHEME: BlunarKBank
    scripts:
      - name: Instalar XcodeGen
        script: |
          brew install xcodegen

      - name: Generar proyecto Xcode
        script: |
          xcodegen generate

      - name: Compilar sin certificado ni perfil
        script: |
          mkdir -p "$CM_BUILD_DIR/unsigned"
          xcodebuild \
            -project "BlunarKBank.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR="$CM_BUILD_DIR/unsigned" \
            clean build \
            | tee "$CM_BUILD_DIR/xcodebuild-unsigned.log"

      - name: Empaquetar aplicación sin firma
        script: |
          cd "$CM_BUILD_DIR/unsigned"
          APP_PATH=$(find . -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No se encontró la aplicación compilada"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "BlunarKBank-unsigned.app.zip"

    artifacts:
      - build/unsigned/*.app
      - build/unsigned/*.zip
      - build/xcodebuild-unsigned.log
      - /tmp/xcodebuild_logs/*.log
